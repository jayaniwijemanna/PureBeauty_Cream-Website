<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | PureBeauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#d4a373',
                        secondary: '#faedcd',
                        dark: '#333333',
                        light: '#faf9f8'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light text-dark relative min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="w-full z-50 bg-white shadow-sm py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <span class="text-2xl font-bold tracking-widest text-primary uppercase" style="font-family: 'Playfair Display', serif;">PureBeauty</span>
            </a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="index.html" class="text-gray-500 hover:text-primary transition font-medium">Home</a>
                <a href="shop.html" class="text-primary transition font-bold border-b-2 border-primary pb-1">Shop</a>
                <a href="about.html" class="text-gray-500 hover:text-primary transition font-medium">About</a>
                <a href="contact.html" class="text-gray-500 hover:text-primary transition font-medium">Contact</a>
            </div>
            <div class="flex items-center space-x-6">
                <!-- Cart Icon -->
                <a href="cart.html" class="text-dark hover:text-primary transition relative group">
                    <i class="fas fa-shopping-bag text-xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-primary text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold" style="display: none;">0</span>
                </a>
                <button id="mobile-menu-btn" class="md:hidden text-dark hover:text-primary focus:outline-none">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden absolute w-full bg-white border-t mt-4 pb-4 shadow-lg z-50">
            <div class="flex flex-col space-y-4 px-6 pt-4">
                <a href="index.html" class="text-dark hover:text-primary transition font-medium border-b pb-2">Home</a>
                <a href="shop.html" class="text-primary font-bold border-b pb-2">Shop</a>
                <a href="about.html" class="text-dark hover:text-primary transition font-medium border-b pb-2">About</a>
                <a href="contact.html" class="text-dark hover:text-primary transition font-medium pb-2">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="bg-secondary bg-opacity-30 py-16 text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">Our Collection</h1>
        <p class="text-gray-600 max-w-2xl mx-auto px-4">Discover the perfect cream tailored to your skin's unique needs. Every jar is a promise of purity, luxury, and results.</p>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        
        <!-- Product Grid -->
        <div id="shop-products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- JS dynamically injects products here from LocalStorage -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white pt-10 pb-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h3 class="text-2xl font-bold tracking-widest text-primary uppercase mb-4" style="font-family: 'Playfair Display', serif;">PureBeauty</h3>
            <p class="text-gray-400 text-sm">&copy; 2026 PureBeauty Cosmetics. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
